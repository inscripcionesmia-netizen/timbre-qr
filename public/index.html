<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Llamar al Timbre</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .bell {
      font-size: 5rem;
      margin-bottom: 1rem;
      display: block;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
    h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.5rem; }
    .sub { opacity: .7; font-size: .95rem; margin-bottom: 1.8rem; }
    .status {
      background: rgba(233,69,96,0.15);
      border: 1px solid rgba(233,69,96,0.3);
      border-radius: 16px;
      padding: 1rem;
      font-size: 1.1rem;
      min-height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      transition: .3s;
    }
    .status.loading { border-color: rgba(255,200,50,0.4); }
    .status.done { border-color: rgba(80,200,120,0.4); background: rgba(80,200,120,0.1); }
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { margin-top: 2rem; font-size: .8rem; opacity: .4; }
  </style>
</head>
<body>
  <div class="card">
    <span class="bell">🔔</span>
    <h1>Timbre Inteligente</h1>
    <p class="sub">Escanea el código QR para llamar</p>
    <div class="status" id="status">
      <span class="spinner"></span>
      Llamando a la puerta…
    </div>
    <p class="footer">Espere unos segundos, por favor</p>
  </div>

  <script>
    (async () => {
      const status = document.getElementById("status");
      try {
        const res = await fetch("/api/llamar", { method: "POST" });
        const data = await res.json();
        if (data.ok) {
          status.className = "status done";
          status.innerHTML = "✅ " + data.mensaje;
          // Reproducir sonido en el teléfono del visitante
          try {
            const audio = new Audio("/sonido.wav");
            audio.play();
          } catch {}
        } else {
          throw new Error("Respuesta inesperada");
        }
      } catch {
        status.className = "status";
        status.innerHTML = "❌ Error de conexión. ¿El servidor está encendido?";
      }
    })();
  </script>
</body>
</html>
