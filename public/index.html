<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timbre Inteligente</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .bell {
      font-size: 5rem;
      margin-bottom: 1rem;
      display: block;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
    h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.5rem; }
    .sub { opacity: .7; font-size: .95rem; margin-bottom: 1.8rem; }
    .btn-timbre {
      width: 100%;
      padding: 1.2rem;
      border: none;
      border-radius: 20px;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
      background: #e94560;
      color: #fff;
      margin-bottom: 1rem;
    }
    .btn-timbre:active { transform: scale(.95); }
    .btn-timbre:disabled { opacity: .5; }
    .btn-detener {
      width: 100%;
      padding: .8rem;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: .2s;
      background: #ff4444;
      color: #fff;
      display: none;
      margin-bottom: 1rem;
    }
    .btn-detener:active { transform: scale(.95); }
    .status {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1rem;
      font-size: 1rem;
      min-height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      transition: .3s;
    }
    .footer { margin-top: 2rem; font-size: .8rem; opacity: .4; }
  </style>
</head>
<body>
  <div class="card">
    <span class="bell">🔔</span>
    <h1>Timbre Inteligente</h1>
    <p class="sub">Presiona el botón para llamar</p>

    <button class="btn-timbre" id="btnLlamar">🔔 TOCAR TIMBRE</button>
    <button class="btn-detener" id="btnDetener">🔕 Detener</button>

    <div class="status" id="status">Toca el botón para llamar a la puerta</div>
    <p class="footer">Sonará un timbre y se notificará al dueño</p>
  </div>

  <script>
    const btnLlamar = document.getElementById("btnLlamar");
    const btnDetener = document.getElementById("btnDetener");
    const status = document.getElementById("status");
    let currentAudio = null;
    let isRinging = false;

    function detenerSonido() {
      if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
      isRinging = false;
      btnDetener.style.display = "none";
    }

    btnDetener.addEventListener("click", detenerSonido);

    btnLlamar.addEventListener("click", () => {
      btnLlamar.disabled = true;
      btnLlamar.textContent = "🔔 ¡TIMBRE!";
      detenerSonido();

      // CRÍTICO: El audio debe empezar ANTES del fetch (requisito de móviles)
      isRinging = true;
      btnDetener.style.display = "block";
      status.textContent = "✅ Llamando a la puerta…";

      function reproducir() {
        if (!isRinging) return;
        currentAudio = new Audio("/sonido.wav");
        currentAudio.play().catch(() => {
          // Si no puede reproducir, reintentar con Web Audio API
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.frequency.setValueAtTime(660, ctx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.2);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 1.2);
          } catch {}
        });
        currentAudio.onended = () => { if (isRinging) setTimeout(reproducir, 400); };
      }

      reproducir();

      // Llamar a la API en paralelo (sin await para no bloquear el audio)
      fetch("/api/llamar", { method: "POST" })
        .then(r => r.json())
        .then(data => {
          if (data.ok) status.textContent = "✅ " + data.mensaje;
          else status.textContent = "❌ Error";
        })
        .catch(() => { status.textContent = "❌ Error de conexión"; })
        .finally(() => {
          btnLlamar.disabled = false;
          btnLlamar.textContent = "🔔 TOCAR TIMBRE";
        });
    });
  </script>
</body>
</html>
